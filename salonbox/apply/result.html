<!doctype html>
<html lang="ja">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7FCVY8Y59Q"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-7FCVY8Y59Q');

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@700&display=swap">
  <title>お申込み結果 | SalonBox</title>
  <meta name="description" content="Stripe決済完了後の受付状況を確認する画面です。" />
  <link rel="stylesheet" href="../css/style3.css">
  <style>
    /* result 用の追加スタイル */
    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }

    .result-badge.processing {
      background: #fff7ec;
      color: #8a5216;
      border: 1px solid #f1d9b7;
    }

    .result-badge.done {
      background: #e8f7ef;
      color: #115532;
      border: 1px solid #c9e9d4;
    }

    .result-badge.error {
      background: #fff3f1;
      color: #8c2b1b;
      border: 1px solid #f6c8c2;
    }

    .result-actions {
      margin-top: 32px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .result-actions a {
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header class="efo-header">
    <div class="efo-container">
      <div class="efo-header-top">
        <a href="../index.html" class="efo-back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          トップページに戻る
        </a>
      </div>
      <span class="efo-eyebrow">APPLY STATUS</span>
      <h1 class="efo-title">お申込み結果</h1>
    </div>
  </header>

  <main class="efo-container" style="padding-top:32px;">
    <div class="efo-card" style="padding: 40px 24px; text-align: center;">
      <div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:16px;">
        <span class="result-badge processing" id="statusBadge">受付確認中</span>
        <span style="font-size:13px; color:var(--c-text-sub);" id="appIdLabel"></span>
      </div>

      <h2 id="resultTitle"
        style="font-size: 24px; margin-bottom: 16px; color: var(--c-text-main); font-family: var(--font-serif);">
        決済が完了しました</h2>
      <p id="resultDesc" style="color: var(--c-text-sub); margin-bottom: 8px;">お申込みを処理中です。少々お待ちください。</p>
      <p id="noteText" style="color: var(--c-text-sub); font-size: 14px;">画面を閉じても後ほどメールでご案内します。</p>

      <div id="actions" class="result-actions" hidden>
        <a class="btn-next" style="display:inline-flex;" href="index.html">申込み画面に戻る</a>
      </div>
    </div>
  </main>

  <script src="../js/common.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const result = (params.get('result') || params.get('status') || params.get('redirect_status') || '').toLowerCase();
      const applicationId = params.get('applicationId') || params.get('application_id') || '';
      const statusEndpoint = 'https://api.salonbox.mactism-products.com/public/apply/status';
      const statusBadge = document.getElementById('statusBadge');
      const resultTitle = document.getElementById('resultTitle');
      const resultDesc = document.getElementById('resultDesc');
      const noteText = document.getElementById('noteText');
      const actions = document.getElementById('actions');
      const appIdLabel = document.getElementById('appIdLabel');

      function setBadge(text, cls) {
        statusBadge.textContent = text;
        statusBadge.className = 'result-badge ' + cls;
      }
      function showActions() { actions.hidden = false; }
      if (applicationId) { appIdLabel.textContent = 'ID: ' + applicationId; }

      if (result === 'cancel' || result === 'canceled') {
        setBadge('キャンセル', 'error');
        resultTitle.textContent = '決済をキャンセルしました';
        resultDesc.textContent = '再度お手続きされる場合は「申込み画面に戻る」からやり直してください。';
        noteText.textContent = 'キャンセルが意図したものでない場合はサポートまでご連絡ください。';
        showActions();
        return;
      }

      if (result === 'success' || result === 'succeeded') {
        setBadge('受付確認中', 'processing');
        resultTitle.textContent = '決済が完了しました';
        resultDesc.textContent = 'お申込みを処理中です。完了までそのままお待ちください。';
        pollStatus();
        return;
      }

      // どちらでもない場合
      setBadge('エラー', 'error');
      resultTitle.textContent = 'パラメータが不足しています';
      resultDesc.textContent = 'result または applicationId が取得できませんでした。お手数ですが最初からお申込みをお願いします。';
      noteText.textContent = '';
      showActions();

      async function pollStatus() {
        if (!statusEndpoint || !applicationId) {
          setBadge('受付確認中', 'processing');
          resultDesc.textContent = '受付情報が確認できませんでした。時間をおいて再表示してください。';
          showActions();
          return;
        }
        const maxAttempts = 6;
        const waitMs = 1500;
        for (let i = 0; i < maxAttempts; i++) {
          try {
            const url = new URL(statusEndpoint);
            url.searchParams.set('application_id', applicationId);
            const res = await fetch(url.toString(), { method: 'GET' });
            const raw = await res.text();
            let data = null;
            if (raw) { try { data = JSON.parse(raw); } catch (_) { /* noop */ } }
            if (!res.ok) {
              throw new Error((data && (data.message || data.error)) || raw || 'ステータス確認に失敗しました。');
            }
            const status = (data && (data.status || data.state || data.applicationStatus || '')).toLowerCase();
            if (status === 'trialing' || status === 'active' || status === 'succeeded') {
              setBadge('完了', 'done');
              resultTitle.textContent = 'お申込みが完了しました';
              resultDesc.textContent = status === 'trialing'
                ? 'カード登録と受付が完了しました。利用開始日に請求が発生し利用可能となります。'
                : 'ご登録ありがとうございました。後ほどメールでご案内いたします。';
              noteText.textContent = '画面を閉じても問題ありません。';
              showActions();
              return;
            }
          } catch (err) {
            setBadge('エラー', 'error');
            resultTitle.textContent = 'ステータス確認に失敗しました';
            resultDesc.textContent = err.message || '時間をおいて再度お試しください。';
            showActions();
            return;
          }
          await new Promise(r => setTimeout(r, waitMs));
        }
        setBadge('受付確認中', 'processing');
        resultDesc.textContent = 'まだ処理中です。完了次第メールでご案内します。';
        showActions();
      }
    })();
  </script>
</body>

</html>
