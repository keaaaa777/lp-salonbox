  <main class="efo-container">
    <form id="contactForm" novalidate data-endpoint="https://api.salonbox.mactism-products.com/public/contact">
      <div class="efo-card">

        <div class="efo-notice-bar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          </svg>
          翌営業日以内に専任担当者よりご連絡します。任意項目はスキップOKです。
        </div>

        <!-- お問い合わせ種別（ボタンスタイルラジオ） -->

          <label>ご相談内容</label>
          <div class="efo-topic-grid">
            <!-- <label class="efo-radio-label">
              <input type="radio" name="topic" value="CSVファイル診断" checked>
              <span class="efo-radio-btn">無料診断</span>
            </label> -->
            <label class="efo-radio-label">
              <input type="radio" name="topic" value="トライアル応募">
              <span class="efo-radio-btn">トライアル応募</span>
            </label>
            <label class="efo-radio-label">
              <input type="radio" name="topic" value="導入相談">
              <span class="efo-radio-btn">導入・運用相談</span>
            </label>
            <label class="efo-radio-label">
              <input type="radio" name="topic" value="エンタープライズ">
              <span class="efo-radio-btn">カスタマイズのご相談（エンタープライズ）</span>
            </label>
            <label class="efo-radio-label">
              <input type="radio" name="topic" value="その他">
              <span class="efo-radio-btn">その他ご質問</span>
            </label>
          </div>
          <p id="csvTopicNotice" class="efo-topic-note" hidden>
            お問い合わせ受付後、返信用メールをお送りいたしますので<br>
            そこからデータの送付をお願い致します。
          </p>
        </div>

        <!-- メイン入力エリア -->
        <div class="efo-main-inputs">
          <div class="efo-field">
            <label for="name">お名前 <span class="efo-badge-req">必須</span></label>
            <input id="name" name="name" type="text" class="efo-input req-field" required placeholder="山田 太郎"
              autocomplete="name">
          </div>

          <div class="efo-field">
            <label for="email">メールアドレス <span class="efo-badge-req">必須</span></label>
            <input id="email" name="email" type="email" class="efo-input req-field" required
              placeholder="owner@example.com" autocomplete="email">
            <p class="efo-hint">受付確認メールを自動送信します</p>
          </div>

          <div class="efo-field">
            <label for="company">企業名・屋号 <span class="efo-badge-req">必須</span></label>
            <input id="company" name="company" type="text" class="efo-input req-field" required placeholder="◯◯サロン"
              autocomplete="organization">
          </div>

          <div class="efo-field">
            <label for="stores">店舗数 <span class="efo-badge-req">必須</span></label>
            <div class="efo-select-wrap">

                  <select id="timeframe" name="timeframe" class="efo-input" data-options-template="tpl-timeframe">

              <div class="efo-field">
                <label for="budget">ご予算目安</label>
                <input id="budget" name="budget" type="text" class="efo-input" placeholder="例）月◯万円／都度◯万円">
              </div> -->

                  <select id="contactPref" name="contactPref" class="efo-input"

                    <option value="" selected>特になし</option>
                  </select>

              </div>
              <div class="efo-field efo-col-span-2">
                <label for="painPoints">今のお困りごと</label>
                <textarea id="painPoints" name="painPoints" class="efo-input efo-textarea"
                  placeholder="例）集計に時間がかかる、店舗ごとの売上比較がしづらい など"></textarea>
              </div>
              <div class="efo-field efo-col-span-2">
                <label for="message">そのほか</label>
                <textarea id="message" name="message" class="efo-input efo-textarea"
                  placeholder="現状の課題・使いたい機能について、気になることがあればご自由にご記載ください。"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 下部固定 送信エリア -->
      <div class="efo-fixed-bottom">
        <div class="efo-container">
          <div id="bottomAssuranceNotice" class="efo-notice-bar" style="margin-bottom:10px;" hidden>
            ・無料診断のみでも問題ありません<br>
            ・本契約前提ではありません<br>
            ・1営業日以内にご連絡します<br>
            ・お送りいただいたデータは診断目的以外には使用しません
          </div>
        </div>
        <div class="efo-container efo-submit-inner">
          <label class="efo-agree-box">
            <input type="checkbox" id="agree" name="agree" class="req-field" required>
            <span class="efo-agree-text"><a href="https://www.mactism.com/privacy/"

          </label>

          <button type="submit" id="contactSubmit" class="efo-btn-submit" disabled>
            <span>送信する</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>

        <div class="efo-container">
          <div id="alertOk" class="efo-alert alert-ok">送信が完了しました。</div>
          <div id="alertErr" class="efo-alert alert-err">エラーが発生しました。入力内容をご確認ください。</div>
        </div>
      </div>

      <input type="hidden" id="lp" name="lp">
      <input type="hidden" name="page" value="contact">
    </form>

  <script>
    (function () {
      var selects = document.querySelectorAll('select[data-options-template]');
      selects.forEach(function (select) {
        var templateId = select.getAttribute('data-options-template');
        var template = document.getElementById(templateId);
        if (!template || !('content' in template)) return;
        select.appendChild(template.content.cloneNode(true));
      });
    })();

    const accordionBtn = document.getElementById('accordionBtn');
    const accordionContent = document.getElementById('accordionContent');
    accordionBtn.addEventListener('click', () => {
      const isExpanded = accordionBtn.getAttribute('aria-expanded') === 'true';
      accordionBtn.setAttribute('aria-expanded', !isExpanded);
      accordionContent.classList.toggle('is-open');
    });

    // ここから進捗とアニメーションの制御
    const textReqFields = Array.from(document.querySelectorAll('input.req-field[type="text"], input.req-field[type="email"]'));
    const storesField = document.getElementById('stores');
    const progressReqFields = storesField ? textReqFields.concat(storesField) : textReqFields;
    const agreeCheckbox = document.getElementById('agree');
    const agreeBox = document.querySelector('.efo-agree-box');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const submitBtn = document.getElementById('contactSubmit');
    const totalReq = progressReqFields.length;
    const topicRadios = Array.from(document.querySelectorAll('input[name="topic"]'));
    const csvTopicRadio = topicRadios.find(function (radio) { return /CSV/i.test(radio.value || ''); }) || null;
    const monitorTopicRadio = topicRadios.find(function (radio) { return /monitor|トライアル/i.test(radio.value || ''); }) || null;
    const urlParams = new URLSearchParams(window.location.search);
    const topicPreset = (urlParams.get('topic') || '').toLowerCase();
    const monitorOnlyMode = /^(monitor|monitor_apply|monitor-apply|trial)$/.test(topicPreset);
    const csvTopicNotice = document.getElementById('csvTopicNotice');
    const bottomAssuranceNotice = document.getElementById('bottomAssuranceNotice');
    const csvNoticeText = 'CSV1ファイルをお送りいただければ、SalonBoxでどのように見えるか、<br>どこに改善余地があるかを確認できます。※お送りいただくのはお申込み後の返信からです。<br>まずはお気軽にお申し込みください。';
    const monitorNoticeHtml =
      '<div class="efo-monitor-price">' +
      '<div class="efo-monitor-price-row">' +
      '<span class="efo-monitor-fee-label">月額費用(1カ月のみ)</span>' +
      '<span class="efo-monitor-old">¥24,800</span>' +
      '<span class="efo-monitor-new">¥9,800</span>' +
      '<span class="efo-monitor-off">約60%OFF</span>' +
      '</div>' +
      '<div class="efo-monitor-initial">' +
      '初期費用 <span class="efo-monitor-old">¥50,000</span> <span class="efo-monitor-x">×</span> かかりません' +
      '</div>' +
      '<div class="efo-monitor-initial">' +
      '専任担当者による導入サポート' +
      '</div>' +
      '</div>' +
      '<div class="efo-monitor-desc">トライアル期間中は、アプリ改善を目的としたご意見・ご感想のご提供をお願いしております。' +
      '<br>具体的な内容につきましては、お問い合わせ後にご案内いたします。' +
      '<br>※応募のみため、クレジットカードなどの決済情報は不要です。</div>';

    function applyMonitorOnlyTopicMode() {
      if (!monitorOnlyMode || !topicRadios.length) return;
      var topicGrid = document.querySelector('.efo-topic-grid');
      if (topicGrid) {
        topicGrid.classList.add('is-single-topic');
      }
      topicRadios.forEach(function (radio) {
        var label = radio.closest('.efo-radio-label');
        var isMonitor = monitorTopicRadio && radio === monitorTopicRadio;
        if (label) {
          label.style.display = isMonitor ? '' : 'none';
        }
        radio.checked = !!isMonitor;
      });
    }

    function updateCsvTopicNotice() {
      if (!csvTopicNotice) return;
      if (csvTopicRadio && csvTopicRadio.checked) {
        csvTopicNotice.innerHTML = csvNoticeText;
        csvTopicNotice.classList.remove('is-monitor');
        csvTopicNotice.hidden = false;
        return;
      }
      if (monitorTopicRadio && monitorTopicRadio.checked) {
        csvTopicNotice.innerHTML = '<strong>特典内容：</strong>' + monitorNoticeHtml;
        csvTopicNotice.classList.add('is-monitor');
        csvTopicNotice.hidden = false;
        return;
      }
      csvTopicNotice.classList.remove('is-monitor');
      csvTopicNotice.hidden = true;
    }

    function updateBottomAssuranceNotice(requiredFilledCount) {
      if (!bottomAssuranceNotice) return;
      const hasRequiredInput = typeof requiredFilledCount === 'number'
        ? requiredFilledCount >= 2
        : progressReqFields.filter(function (field) { return field.value.trim() !== ''; }).length >= 2;
      const shouldShow = !!(csvTopicRadio && csvTopicRadio.checked && hasRequiredInput);
      if (shouldShow) {
        bottomAssuranceNotice.hidden = false;
        bottomAssuranceNotice.style.removeProperty('display');
      } else {
        bottomAssuranceNotice.hidden = true;
        bottomAssuranceNotice.style.setProperty('display', 'none', 'important');
      }
    }

    function updateProgress() {
      let filled = 0;
      progressReqFields.forEach(field => {
        if (field.value.trim() !== '') filled++;
      });

      const percent = Math.round((filled / totalReq) * 100);
      progressFill.style.width = `${percent}%`;

      // 状態を毎度リセット
      agreeBox.classList.remove('is-pulsing');
      submitBtn.classList.remove('btn-is-pulsing');
      submitBtn.disabled = true;
      submitBtn.classList.remove('is-active');

      if (percent === 100) {
        if (!agreeCheckbox.checked) {
          progressText.textContent = `100% 完了 (プライバシーポリシーにチェックで送信できます)`;
          agreeBox.classList.add('is-pulsing'); // 同意をアピール
        } else {
          progressText.textContent = `100% 完了 (送信できます)`;
          submitBtn.disabled = false;
          submitBtn.classList.add('is-active');
          submitBtn.classList.add('btn-is-pulsing'); // ボタンをアピール
        }
      } else {
        progressText.textContent = `${percent}% 完了`;
      }
      updateBottomAssuranceNotice(filled);
    }

    textReqFields.forEach(field => {
      field.addEventListener('input', updateProgress);
    });
    if (storesField) {
      storesField.addEventListener('change', updateProgress);
    }
    agreeCheckbox.addEventListener('change', updateProgress);
    document.querySelectorAll('input[name="topic"]').forEach(function (radio) {
      radio.addEventListener('change', function () {
        updateCsvTopicNotice();
        updateBottomAssuranceNotice();
      });
    });

    // 初期化
    applyMonitorOnlyTopicMode();
    updateProgress();
    updateCsvTopicNotice();
    updateBottomAssuranceNotice();

    // 戻るボタンの遷移先を動的に制御
    (function () {
      const backBtn = document.querySelector('.efo-back-btn');
      if (!backBtn) return;

      const lp = urlParams.get('lp');

      // 1. パラメータに基づく遷移先の事前設定（history.backが使えない場合のフォールバック）
      if (lp === 'hair') {
        backBtn.href = '../hair/';
      } else if (lp === 'esthetic') {
        backBtn.href = '../esthetic/';
      } else if (lp === 'salonbox') {
        backBtn.href = '../index.html';
      }

      // 2. 同一ドメイン内からの遷移であれば、ブラウザバックを実行（スクロール位置保持のため）
      if (document.referrer && document.referrer.indexOf(window.location.host) !== -1) {
        backBtn.addEventListener('click', function (e) {
          if (window.history.length > 1) {
            e.preventDefault();
            window.history.back();
          }
        });
      }
    })();

  </script>

  <script>
    (function () {
      var meta = document.querySelector('meta[name="recaptcha-site-key"]');
      var siteKey = meta && meta.content;
      if (!siteKey) {
        console.warn('reCAPTCHA site key is missing. Set meta[name="recaptcha-site-key"].');
        return;
      }
      window.RECAPTCHA_SITE_KEY = siteKey;
      var script = document.createElement('script');
      script.src = 'https://www.google.com/recaptcha/api.js?render=' + encodeURIComponent(siteKey);
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    })();
  </script>

  <script src="../js/common.js"></script>
  <script src="../js/form.js"></script>
</body>

</html>
