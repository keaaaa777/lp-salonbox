<!doctype html>
<html lang="ja">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7FCVY8Y59Q"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-7FCVY8Y59Q');
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap">
  <title>お申し込みありがとうございます | SalonBox</title>
  <link rel="stylesheet" href="../../css/lp-contact-csv-analysis.css">
  <style>
    .thanks-wrap {
      padding: 80px 0;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--c-sub-bg);
    }
    .thanks-card {
      background: #fff;
      border-radius: var(--radius-lg);
      padding: 60px 40px;
      text-align: center;
      max-width: 680px;
      width: 100%;
      box-shadow: var(--shadow-md);
    }
    .thanks-icon {
      width: 80px;
      height: 80px;
      background: #E8F5E9;
      color: #2E7D32;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .thanks-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--c-brand-main);
      margin-bottom: 24px;
    }
    .thanks-msg {
      font-size: 16px;
      line-height: 1.8;
      color: var(--c-text-main);
      margin-bottom: 40px;
    }
    .thanks-next-step {
      background: var(--c-accent-bg);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 40px;
      text-align: left;
    }
    .thanks-next-step h4 {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--c-brand-main);
    }
    .thanks-next-step p {
      font-size: 14px;
      margin: 0;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--c-brand-main);
      color: #fff;
      padding: 16px 40px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .back-btn:hover {
      opacity: 0.9;
    }
    @media (max-width: 600px) {
      .thanks-title { font-size: 24px; }
      .thanks-card { padding: 40px 24px; }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-logo">
        <a href="../../index.html"
          style="display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; color: var(--c-text-white);">
          <img src="../../images/logo.webp" alt="SALONBOX" style="height: 32px;">
          SalonBox
        </a>
      </div>
    </div>
  </header>

  <main class="thanks-wrap">
    <div class="container">
      <div class="thanks-card">
        <div class="thanks-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h1 class="thanks-title">無料CSV診断への<br>お申し込み、完了しました。</h1>
        <p class="thanks-msg">
          この度はSalonBoxの無料CSV診断にお申し込みいただき、誠にありがとうございます。<br>
          入力いただいたメールアドレス宛に、確認メールをお送りしました。
        </p>

        <div class="thanks-next-step">
          <h4>今後の流れ</h4>
          <p>
            1. 自動返信メールが届いているかご確認ください。<br>
            2. お送りいただいたデータを元に診断を行い、1営業日以内に結果をご返信いたします。
          </p>
        </div>

        <a href="../../index.html" class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          トップページへ戻る
        </a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-info">
        <div style="display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 20px; color: #fff; margin-bottom: 20px;">
          <img src="../../images/logo.webp" alt="SALONBOX" style="height: 32px;">
          SalonBox
        </div>
        <p>多店舗美容院の経営を、もっとシンプルに。</p>
      </div>
      <div class="footer-nav">
        <h5>運営会社</h5>
        <p>株式会社マクティズム</p>
      </div>
    </div>
  </footer>
</body>

</html>
