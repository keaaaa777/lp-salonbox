<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="申込書（中央チェック）アイコン">
  <!--
    Accent: #ff9b39
    Stroke:  #1f2d2f
    Bg:      #eaf5f1
  -->
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- background circle -->
  <circle cx="256" cy="256" r="210" fill="#eaf5f1"/>

  <!-- document -->
  <g filter="url(#softShadow)">
    <path d="M176 136h128l48 48v200c0 17.7-14.3 32-32 32H176c-17.7 0-32-14.3-32-32V168c0-17.7 14.3-32 32-32z"
          fill="#ffffff" stroke="#1f2d2f" stroke-width="12" stroke-linejoin="round"/>
    <!-- folded corner -->
    <path d="M304 136v56c0 8.8 7.2 16 16 16h56"
          fill="none" stroke="#1f2d2f" stroke-width="12" stroke-linejoin="round"/>
  </g>

  <!-- document lines -->
  <g stroke="#1f2d2f" stroke-width="10" stroke-linecap="round" opacity="0.55">
    <line x1="184" y1="232" x2="328" y2="232"/>
    <line x1="184" y1="272" x2="300" y2="272"/>
    <line x1="184" y1="312" x2="284" y2="312"/>
  </g>

  <!-- centered check mark -->
  <path d="M216 270l32 32 64-64"
        fill="none" stroke="#ff9b39" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- subtle accent ring -->
  <circle cx="256" cy="270" r="70"
          fill="none" stroke="#ff9b39"
          stroke-width="10" opacity="0.18"/>
</svg>